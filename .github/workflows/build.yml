name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brief-popup
    steps:
      - uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # O runner ja' vem com o Android SDK instalado.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Sem isso, o AGP gera um debug.keystore novo (chave aleatoria) a cada
      # run, ja' que o runner e' uma VM efemera. Isso quebra "adb install -r"
      # a cada build: a assinatura muda e o Android recusa a atualizacao.
      # Runs futuros restauram a mesma keystore do cache => assinatura estavel.
      - name: Cache do debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore

      # Gera o gradle-wrapper.jar (o unico arquivo binario que faltava).
      - name: Gerar wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Compilar
        run: ./gradlew assembleDebug --stacktrace

      # Diagnostico temporario: o cache em ~/.android/debug.keystore nunca
      # salvou nada ("path does not exist"), entao a keystore debug deve
      # estar sendo criada em outro lugar. Achar o caminho real.
      - name: Diagnostico keystore
        run: |
          echo "HOME=$HOME"
          echo "ANDROID_SDK_HOME=$ANDROID_SDK_HOME"
          echo "ANDROID_USER_HOME=$ANDROID_USER_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la ~/.android/ 2>&1 || echo "~/.android nao existe"
          find / -iname "debug.keystore" 2>/dev/null

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: brief-popup-debug
          path: brief-popup/app/build/outputs/apk/debug/app-debug.apk
