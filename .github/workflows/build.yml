name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brief-popup
    steps:
      - uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # O runner ja' vem com o Android SDK instalado.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Gera o gradle-wrapper.jar (o unico arquivo binario que faltava).
      - name: Gerar wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Compilar
        run: ./gradlew assembleDebug --stacktrace

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: brief-popup-debug
          path: brief-popup/app/build/outputs/apk/debug/app-debug.apk
